name: Deploy to WordPress.org

on:
  push:
    tags:
      - '*'

jobs:
  deploy:
    name: Deploy to wp.org SVN
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate tag format (SemVer X.Y.Z, no 'v' prefix)
        # First-line of defence on what reaches wp.org. Tags must be bare
        # SemVer (e.g. 1.3.2, 1.4.0) — no 'v' prefix, no pre-release suffixes.
        # If the maintainer ever fat-fingers a tag (`v1.4.0`, `1.10`,
        # `1.4.0-beta`, etc.), this fails fast BEFORE any SVN operation.
        #
        # This complements the repository tag-protection ruleset (no delete,
        # no force-update). The format enforcement is here rather than in the
        # ruleset because the `tag_name_pattern` rule type is not currently
        # available via the GitHub REST API on this account; a CI check is
        # the equivalent guard.
        run: |
          set -e
          tag="${GITHUB_REF#refs/tags/}"
          echo "Tag pushed: ${tag}"
          if ! [[ "${tag}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '${tag}' does not match the required SemVer format X.Y.Z (no 'v' prefix, no pre-release suffix)."
            echo "::error::Examples of valid tags: 1.3.2, 1.4.0, 2.0.0"
            echo "::error::Examples of REJECTED tags: v1.4.0, 1.10, 1.0, 1.0.0-beta, 1.0.0+build.1"
            echo "::error::To fix: delete this tag locally (git tag -d ${tag}) and on origin (git push --delete origin ${tag}), then re-tag with the correct format."
            exit 1
          fi
          echo "Tag format OK."

      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Stable tag === PHP Version (STRICT, no -dev suffix)
        # On main between releases the plugin's PHP Version: header carries
        # a -dev suffix (e.g. `1.4.0-dev`) while readme.txt's Stable tag
        # holds the last-published version. That asymmetry is fine for PRs.
        # AT TAG TIME however, wp.org and Plugin Check require exact
        # equality. This step enforces the strict alignment so a release
        # never gets pushed to SVN with a mismatch — preventing the wp.org
        # listing showing a stale "current version".
        run: |
          set -e
          tag="${GITHUB_REF#refs/tags/}"
          stable_tag=$(grep -oP '^Stable tag:\s*\K\S+' readme.txt)
          php_version=$(grep -oP '^\s*\*?\s*Version:\s*\K\S+' hola-simpsons.php)

          echo "Tag being deployed:          ${tag}"
          echo "readme.txt Stable tag:       ${stable_tag}"
          echo "PHP file Version header:     ${php_version}"

          fail=0
          if [ "${stable_tag}" != "${tag}" ]; then
            echo "::error::Stable tag (${stable_tag}) does not match the git tag (${tag}). Update readme.txt's 'Stable tag:' header to ${tag} before tagging."
            fail=1
          fi
          if [ "${php_version}" != "${tag}" ]; then
            echo "::error file=hola-simpsons.php::PHP Version header (${php_version}) does not match the git tag (${tag}). Drop any -dev/-alpha/-rc suffix and update Version: to ${tag} before tagging."
            fail=1
          fi
          if [ "${fail}" -ne 0 ]; then
            echo "::error::Aborting deploy. The release-prep PR must drop pre-release suffixes from PHP and align both version markers (Stable tag, Version) to the tag value."
            exit 1
          fi

          echo "All version markers aligned at ${tag}. Proceeding with SVN deploy."

      - name: WordPress Plugin Deploy
        id: deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          generate-zip: true
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}

      - name: Upload zip to GitHub Release
        if: ${{ steps.deploy.outputs.zip-path != '' }}
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.deploy.outputs.zip-path }}
