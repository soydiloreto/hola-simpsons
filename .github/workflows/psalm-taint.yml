name: Security taint analysis (Psalm)

# Psalm is configured (psalm.xml) for taint-analysis only — tracking
# user-controlled values from $_GET / $_POST / $_REQUEST / $_COOKIE /
# $_FILES / $_SERVER through to dangerous sinks (echo, $wpdb->query,
# exec, file_put_contents, …). General static type-checking is done
# by the PHPStan level 8 job (.github/workflows/tests-stan.yml); this
# workflow exists to surface XSS, SQL-injection, and command-injection
# paths that PHPStan does not check for.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  psalm-taint:
    name: Psalm taint analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Determine Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-psalm-${{ runner.os }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-psalm-${{ runner.os }}-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run Psalm taint analysis
        # Fails on any taint finding (the analyser runs in addition to the
        # regular pass; we keep the regular pass quiet via psalm.xml).
        run: composer psalm:taint
