name: i18n validation

# Validates the plugin's translation strings: extracts a .pot via
# `wp i18n make-pot`, captures the output, and fails the build if any
# "Warning:" or "Error:" lines appear (e.g. missing translator
# comments on sprintf placeholders, dynamic text domains, concat of
# translatable parts). Then sanity-checks that the generated file is
# non-empty.
#
# WordPress Plugin Check (.github/workflows/pr-checks.yml) already
# enforces a subset of i18n rules at PHPCS time. This workflow adds
# the WP-CLI i18n linter, which catches a different (and overlapping)
# set of issues — together they form a fairly tight i18n net.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  i18n:
    name: WP-CLI i18n make-pot
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2, wp-cli

      - name: Run wp i18n make-pot
        id: makepot
        # --exclude: skip dev/test/vendor directories — only validate
        #   the code that actually ships in the wp.org plugin.
        # We capture all output so the next step can decide whether
        # warnings fail the build (WP-CLI itself does not have a
        # `--strict` flag — extraction warnings print to stderr but
        # don't change the exit code).
        run: |
          mkdir -p build
          set +e
          OUTPUT=$(wp i18n make-pot . build/hola-simpsons.pot \
            --slug=hola-simpsons \
            --domain=hola-simpsons \
            --exclude=tests,vendor,node_modules,.wordpress-org,docs,build 2>&1)
          STATUS=$?
          echo "$OUTPUT"
          {
            echo 'output<<EOF_DELIM'
            echo "$OUTPUT"
            echo 'EOF_DELIM'
          } >> "$GITHUB_OUTPUT"
          exit "$STATUS"

      - name: Fail on extraction warnings
        # Any "Warning:" line in `wp i18n make-pot` output indicates a
        # missing translator comment, dynamic text domain, concat'd
        # translatable strings, or similar — all real i18n bugs that
        # WP-CLI prints but does not exit non-zero on.
        env:
          MAKEPOT_OUTPUT: ${{ steps.makepot.outputs.output }}
        run: |
          if printf '%s\n' "$MAKEPOT_OUTPUT" | grep -E '^(Warning|Error):' >&2; then
            echo "::error::wp i18n make-pot reported warnings/errors above."
            exit 1
          fi
          echo "No i18n extraction warnings."

      - name: Verify .pot is non-empty
        # An empty .pot is a strong sign the extraction misfired (e.g.
        # the WP-CLI scanner ignored every PHP file in the project).
        run: |
          set -e
          POT_FILE=build/hola-simpsons.pot
          if [ ! -s "$POT_FILE" ]; then
            echo "::error::POT file is missing or empty: $POT_FILE"
            exit 1
          fi
          MSGID_COUNT=$(grep -c '^msgid "' "$POT_FILE" || true)
          echo "Extracted $MSGID_COUNT msgid entries."
          # Header counts as one msgid; require >1 so we know real
          # strings were extracted.
          if [ "$MSGID_COUNT" -le 1 ]; then
            echo "::error::POT file extracted no translatable strings."
            exit 1
          fi

      - name: Upload .pot artefact
        uses: actions/upload-artifact@v4
        with:
          name: hola-simpsons-pot
          path: build/hola-simpsons.pot
          retention-days: 14
